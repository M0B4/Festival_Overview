<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metal Festival Hub 2026</title>
    <style>
         :root {
            --metal-orange: #f39c12;
            --bg-dark: #121212;
            --card-bg: #1e1e1e;
        }
        
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-dark);
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
        }
        
        header {
            border-bottom: 3px solid var(--metal-orange);
            padding: 20px 0;
            margin-bottom: 20px;
            text-align: center;
        }
        
        h1 {
            color: var(--metal-orange);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0;
        }
        
        .container {
            max-width: 1100px;
            margin: 0 auto;
        }
        /* Controls Area */
        
        .controls-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #333;
        }
        
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        label {
            font-size: 12px;
            text-transform: uppercase;
            color: var(--metal-orange);
            font-weight: bold;
        }
        
        input[type="text"],
        select {
            background: #252525;
            color: white;
            border: 1px solid #444;
            padding: 12px;
            border-radius: 4px;
            font-size: 16px;
        }
        
        input[type="text"]:focus {
            border-color: var(--metal-orange);
            outline: none;
        }
        /* Multi-Compare Checkboxes */
        
        .compare-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding: 10px;
            background: #181818;
            border-radius: 4px;
            max-height: 120px;
            overflow-y: auto;
            border: 1px solid #333;
        }
        
        .compare-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 13px;
            background: #252525;
            padding: 5px 10px;
            border-radius: 20px;
            border: 1px solid #444;
            cursor: pointer;
        }
        
        .compare-item input {
            cursor: pointer;
        }
        
        .compare-item:hover {
            border-color: var(--metal-orange);
        }
        /* Table */
        
        main {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th,
        td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid #333;
        }
        
        th {
            background-color: #252525;
            color: var(--metal-orange);
            text-transform: uppercase;
            font-size: 13px;
            position: sticky;
            top: 0;
        }
        
        .flag-icon {
            width: 24px;
            border-radius: 2px;
        }
        
        .shared-band {
            background-color: rgba(46, 204, 113, 0.08);
        }
        /* Update für die Badges */
        
        .badge-container {
            display: inline-flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-left: 8px;
            vertical-align: middle;
        }
        
        .badge {
            background: #2ecc71;
            color: #000;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 10px;
            font-weight: bold;
            white-space: nowrap;
        }
        
        .band-name {
            color: #ffffff;
            font-weight: 600;
        }
        
        #stats {
            margin-bottom: 15px;
            font-size: 14px;
            color: #888;
        }
        
        @media (max-width: 768px) {
            .controls-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

                <input type="text" id="search-input" placeholder="z.B. Gojira oder Death Metal...">
            </div>

            <div class="control-group">
                <label>3. Vergleichen mit...</label>

            </div>
        </div>

        function getFlagImg(countryName) {
            if (!countryName) return '🏴';
            const code = countryCodes[countryName.trim().toLowerCase()];
            return code ? `<img src="https://flagcdn.com/w40/${code}.png" class="flag-icon">` : '🏴';
        }

        function prettyName(filename) {
            return filename.replace('.json', '').replace(/_/g, ' ')
                .split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
        }

        // 1. Dateien von GitHub holen
        async function init() {
            try {
                const res = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${DATA_FOLDER}`);
                const files = await res.json();
                allFestivalFiles = files.filter(f => f.name.endsWith('.json'));

                primarySelect.innerHTML = '';
                compareContainer.innerHTML = '';

                allFestivalFiles.forEach(file => {
                    // Haupt-Select
                    const opt = document.createElement('option');
                    opt.value = file.path;
                    opt.textContent = prettyName(file.name);
                    primarySelect.appendChild(opt);
                });

                updateCompareCheckboxes();
                loadPrimaryData();

            } catch (e) {
                stats.innerText = "Fehler beim Laden der GitHub-Daten.";
            }
        }

        // 2. Vergleichs-Checkboxen generieren (ohne das Hauptfestival)
        function updateCompareCheckboxes() {
            compareContainer.innerHTML = '';
            allFestivalFiles.forEach(file => {
                if (file.path === primarySelect.value) return;

                const label = document.createElement('label');
                label.className = 'compare-item';
                label.innerHTML = `<input type="checkbox" value="${file.path}"> ${prettyName(file.name)}`;
                label.querySelector('input').addEventListener('change', renderTable);
                compareContainer.appendChild(label);
            });
        }

        // 3. Hauptdaten laden
        async function loadPrimaryData() {
            const res = await fetch(primarySelect.value);
            primaryBands = await res.json();
            renderTable();
        }

        // 4. Kern-Logik: Filtern, Vergleichen und Anzeigen
        async function renderTable() {
            const searchTerm = searchInput.value.toLowerCase();
            const checkedCheckboxes = Array.from(compareContainer.querySelectorAll('input:checked'));

            // matchMap speichert: { "bandname": ["Festival A", "Festival B"] }
            let matchMap = {};

            for (let cb of checkedCheckboxes) {
                const festivalPath = cb.value;
                const festivalName = cb.parentNode.textContent.trim();

                // Daten laden/cachen falls noch nicht geschehen
                if (!cachedComparisons[festivalPath]) {
                    try {
                        const res = await fetch(festivalPath);
                        const data = await res.json();
                        cachedComparisons[festivalPath] = new Set(data.map(b => b.name.toLowerCase().trim()));
                    } catch (e) {
                        console.error("Fehler beim Laden von " + festivalName);
                        continue;
                    }
                }

                // Abgleich: Jeden Namen in der matchMap registrieren
                cachedComparisons[festivalPath].forEach(name => {
                    if (!matchMap[name]) matchMap[name] = [];
                    matchMap[name].push(festivalName);
                });
            }

            // Filtern der primären Liste (Suche)
            const filtered = primaryBands.filter(band => {
                const matchesSearch = (band.name || "").toLowerCase().includes(searchTerm) ||
                    (band.genre || "").toLowerCase().includes(searchTerm);
                return matchesSearch;
            });

            tableBody.innerHTML = '';
            let overlapCount = 0;

            filtered.forEach(band => {
                const lowName = (band.name || "").toLowerCase().trim();
                const matches = matchMap[lowName] || []; // Liste der Festivals, die diese Band auch haben
                const isShared = matches.length > 0;

                if (isShared) overlapCount++;

                const row = document.createElement('tr');
                if (isShared) row.classList.add('shared-band');

                // Erstelle Badges für jedes gefundene Festival
                let badgesHtml = '<div class="badge-container">';
                matches.forEach(fest => {
                    badgesHtml += `<span class="badge">${fest}</span>`;
                });
                badgesHtml += '</div>';

                row.innerHTML = `
            <td>${getFlagImg(band.country)}</td>
            <td class="band-name">
                ${band.name}
                ${isShared ? badgesHtml : ''}
            </td>
            <td>${band.genre || "N/A"}</td>
        `;
                tableBody.appendChild(row);
            });

            stats.innerText = `${filtered.length} Bands angezeigt. ` +
                (checkedCheckboxes.length > 0 ? `| ${overlapCount} Überschneidungen gefunden.` : '');
        }

        // Events
        primarySelect.addEventListener('change', () => {
            updateCompareCheckboxes();
            loadPrimaryData();
        });
        searchInput.addEventListener('input', renderTable);

        init();
    </script>
