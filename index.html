<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metal Festival Hub 2026</title>

    <script src="countries.js"></script>
    <script src="festivals.js"></script>

    <style>
         :root {
            --metal-orange: #f39c12;
            --bg-dark: #121212;
            --card-bg: #1e1e1e;
        }
        
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-dark);
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
        }
        
        header {
            border-bottom: 3px solid var(--metal-orange);
            padding: 20px 0;
            margin-bottom: 20px;
            text-align: center;
        }
        
        h1 {
            color: var(--metal-orange);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0;
        }
        
        .container {
            max-width: 1100px;
            margin: 0 auto;
        }
        /* NEU: Festival Info Card Styling */
        
        #festival-info-card {
            display: none;
            /* Wird erst eingeblendet, wenn Daten da sind */
            background: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #333;
            border-left: 5px solid var(--metal-orange);
        }
        
        .info-content-wrapper {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }
        
        #info-poster {
            max-width: 180px;
            height: auto;
            border-radius: 4px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            border: 1px solid #444;
        }
        
        .info-text-side {
            flex: 1;
        }
        /* Controls & Filter */
        
        .controls-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #333;
        }
        
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        label {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--metal-orange);
            font-weight: bold;
        }
        
        input[type="text"],
        select {
            background: #252525;
            color: white;
            border: 1px solid #444;
            padding: 12px;
            border-radius: 4px;
            font-size: 15px;
        }
        
        .compare-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding: 10px;
            background: #181818;
            border-radius: 4px;
            max-height: 150px;
            overflow-y: auto;
            border: 1px solid #333;
        }
        
        .compare-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            background: #252525;
            padding: 5px 10px;
            border-radius: 20px;
            border: 1px solid #444;
            cursor: pointer;
        }
        /* Tabelle & Statistik */
        
        main {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
        }
        
        #genre-stats {
            background: #181818;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #333;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }
        
        .stat-bar-bg {
            background: #333;
            height: 6px;
            border-radius: 3px;
            overflow: hidden;
        }
        
        .stat-bar-fill {
            background: var(--metal-orange);
            height: 100%;
            transition: width 0.5s ease;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th,
        td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid #333;
        }
        
        th {
            color: var(--metal-orange);
            text-transform: uppercase;
            font-size: 13px;
        }
        
        .flag-icon {
            width: 24px;
            border-radius: 2px;
        }
        
        .badge {
            color: #000;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 10px;
            font-weight: bold;
            margin-left: 5px;
        }
        
        .badge.metal-orange {
            background: #f39c12;
        }
        
        .badge.metal-red {
            background: #e74c3c;
            color: white;
        }
        
        .badge.metal-blue {
            background: #3498db;
            color: white;
        }
        
        @media (max-width: 600px) {
            .controls-grid,
            .info-content-wrapper {
                flex-direction: column;
            }
            #info-poster {
                max-width: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>Festival Hub 2026</h1>
        </header>

        <div id="festival-info-card">
            <div class="info-content-wrapper">
                <img id="info-poster" src="" alt="Poster">
                <div class="info-text-side">
                    <h2 id="info-name" style="margin: 0 0 10px 0; color: var(--metal-orange); text-transform: uppercase;"></h2>
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; font-size: 14px;">
                        <div><strong>Datum:</strong> <span id="info-date"></span></div>
                        <div><strong>Ort:</strong> <span id="info-location"></span></div>
                        <div><strong>Preis:</strong> <span id="info-price"></span></div>
                        <div><strong>Web:</strong> <a id="info-link" href="#" target="_blank" <div><strong>Web:</strong> <a id="info-link" href="#" target="_blank" style="color: #3498db; text-decoration: none;">Webseite</a></div>
                    </div>
                    <p id="info-desc" style="margin: 15px 0 0 0; font-size: 13px; color: #bbb; font-style: italic;"></p>
                </div>
            </div>
        </div>

        <div class="controls-grid">
            <div class="control-group">
                <label>Haupt-Festival</label>
                <select id="primary-select"><option>Lade...</option></select>
                <input type="text" id="search-input" placeholder="Suchen...">
                <select id="display-filter">
                    <option value="all">Alle Bands</option>
                    <option value="exclusive">Nur exklusive</option>
                    <option value="shared">Nur Überschneidungen</option>
                </select>
            </div>
            <div class="control-group">
                <label>Vergleichen mit...</label>
                <div id="compare-container" class="compare-list"></div>
            </div>
        </div>

        <main>
            <div id="genre-stats">
                <label>Festival DNA</label>
                <div id="stats-grid" class="stats-grid"></div>
            </div>
            <div id="stats" style="margin-bottom:15px; font-size:14px; color:#888;">Initialisierung...</div>
            <table>
                <thead>
                    <tr>
                        <th style="width:40px"></th>
                        <th>Band</th>
                        <th>Genre</th>
                    </tr>
                </thead>
                <tbody id="band-table-body"></tbody>
            </table>
        </main>
    </div>

    <script>
        // --- KONFIGURATION ---
        const GITHUB_USER = 'm0b4';
        const GITHUB_REPO = 'Festival_Overview';
        const DATA_FOLDER = 'data';

        const primarySelect = document.getElementById('primary-select');
        const compareContainer = document.getElementById('compare-container');
        const searchInput = document.getElementById('search-input');
        const displayFilter = document.getElementById('display-filter');
        const tableBody = document.getElementById('band-table-body');
        const stats = document.getElementById('stats');

        let allFestivalFiles = [];
        let primaryBands = [];
        let cachedComparisons = {};
        const colorPallet = ["metal-orange", "metal-red", "metal-blue", "metal-purple"];
        let festivalColors = {};

        // INFO UPDATE LOGIK
        function updateFestivalInfo(filePath) {
            const fileName = filePath.split('/').pop();
            // festivalMetadata kommt aus der festivals.js
            if (typeof festivalMetadata !== 'undefined' && festivalMetadata[fileName]) {
                const info = festivalMetadata[fileName];
                document.getElementById('festival-info-card').style.display = 'block';
                document.getElementById('info-name').innerText = prettyName(fileName);
                document.getElementById('info-date').innerText = info.date || '-';
                document.getElementById('info-location').innerText = info.location || '-';
                document.getElementById('info-link').href = info.website || '#';
                document.getElementById('info-desc').innerText = info.description || '';
                const posterImg = document.getElementById('info-poster');
                if (info.poster) {
                    posterImg.src = info.poster;
                    posterImg.style.display = 'block';
                } else {
                    posterImg.style.display = 'none';
                }
            } else {
                document.getElementById('festival-info-card').style.display = 'none';
            }
        }

        function getFlagImg(countryName) {
            if (!countryName) return '🏴';
            const code = typeof countryCodes !== 'undefined' ? countryCodes[countryName.trim().toLowerCase()] : null;
            return code ? `<img src="https://flagcdn.com/w40/${code}.png" class="flag-icon">` : '🏴';
        }

        function prettyName(filename) {
            return filename.replace('.json', '').replace(/_/g, ' ').split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
        }

        function getFestivalColor(festivalPath) {
            if (!festivalColors[festivalPath]) {
                const index = allFestivalFiles.findIndex(f => f.path === festivalPath);
                festivalColors[festivalPath] = colorPallet[index % colorPallet.length];
            }
            return festivalColors[festivalPath];
        }

        async function init() {
            try {
                const res = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${DATA_FOLDER}`);
                const files = await res.json();
                allFestivalFiles = files.filter(f => f.name.endsWith('.json'));
                primarySelect.innerHTML = '';
                allFestivalFiles.forEach(file => {
                    const opt = document.createElement('option');
                    opt.value = file.path;
                    opt.textContent = prettyName(file.name);
                    primarySelect.appendChild(opt);
                });
                updateCompareCheckboxes();
                loadPrimaryData();
            } catch (e) {
                stats.innerText = "Fehler beim Laden von GitHub.";
            }
        }

        function updateCompareCheckboxes() {
            compareContainer.innerHTML = '';
            allFestivalFiles.forEach(file => {
                if (file.path === primarySelect.value) return;
                const label = document.createElement('label');
                label.className = 'compare-item';
                label.innerHTML = `<input type="checkbox" value="${file.path}"> ${prettyName(file.name)}`;
                label.querySelector('input').addEventListener('change', renderTable);
                compareContainer.appendChild(label);
            });
        }

        async function loadPrimaryData() {
            const filePath = primarySelect.value;
            // AUFRUF DER INFOS
            updateFestivalInfo(filePath);

            const res = await fetch(filePath);
            primaryBands = await res.json();
            renderTable();
        }

        async function renderTable() {
            const searchTerm = searchInput.value.toLowerCase();
            const filterMode = displayFilter.value;
            const checkedCheckboxes = Array.from(compareContainer.querySelectorAll('input:checked'));

            let matchMap = {};
            for (let cb of checkedCheckboxes) {
                const path = cb.value;
                if (!cachedComparisons[path]) {
                    const res = await fetch(path);
                    const data = await res.json();
                    cachedComparisons[path] = new Set(data.map(b => b.name.toLowerCase().trim()));
                }
                cachedComparisons[path].forEach(name => {
                    if (!matchMap[name]) matchMap[name] = [];
                    matchMap[name].push({
                        name: prettyName(path.split('/').pop()),
                        color: getFestivalColor(path)
                    });
                });
            }

            tableBody.innerHTML = '';
            let displayedCount = 0;
            let overlapCount = 0;
            let bandsForStats = [];

            primaryBands.forEach(band => {
                const lowName = (band.name || "").toLowerCase().trim();
                const matches = matchMap[lowName] || [];
                const isShared = matches.length > 0;

                if (filterMode === 'exclusive' && isShared) return;
                if (filterMode === 'shared' && !isShared) return;
                if (!band.name.toLowerCase().includes(searchTerm) && !band.genre.toLowerCase().includes(searchTerm)) return;

                displayedCount++;
                if (isShared) overlapCount++;
                bandsForStats.push(band);

                const row = document.createElement('tr');
                if (isShared) row.classList.add('shared-band');

                let badgesHtml = '<div class="badge-container">';
                matches.forEach(m => {
                    badgesHtml += `<span class="badge ${m.color}">${m.name}</span>`;
                });
                badgesHtml += '</div>';

                row.innerHTML = `
                    <td>${getFlagImg(band.country)}</td>
                    <td class="band-name">${band.name}${isShared ? badgesHtml : ''}</td>
                    <td>${band.genre}</td>
                `;
                tableBody.appendChild(row);
            });

            stats.innerText = `${displayedCount} Bands (${overlapCount} Treffer).`;
            updateGenreStats(bandsForStats);
        }

        function updateGenreStats(displayedBands) {
            const statsGrid = document.getElementById('stats-grid');
            const counts = {};
            displayedBands.forEach(band => {
                const genre = band.genre || "Unknown";
                counts[genre] = (counts[genre] || 0) + 1;
            });
            const sortedGenres = Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, 8);
            const total = displayedBands.length;
            statsGrid.innerHTML = total === 0 ? 'Keine Daten' : '';
            sortedGenres.forEach(([genre, count]) => {
                const percentage = Math.round((count / total) * 100);
                statsGrid.innerHTML += `<div class="stat-item"><div class="stat-info"><span>${genre}</span><span>${percentage}%</span></div><div class="stat-bar-bg"><div class="stat-bar-fill" style="width: ${percentage}%"></div></div></div>`;
            });
        }

        primarySelect.addEventListener('change', () => {
            updateCompareCheckboxes();
            loadPrimaryData();
        });
        searchInput.addEventListener('input', renderTable);
        displayFilter.addEventListener('change', renderTable);
        init();
    </script>
</body>

</html>
