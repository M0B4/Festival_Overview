<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mos Lineup Lab</title>

    <script src="countries.js"></script>
    <script src="festivals.js"></script>

    <style>
        * {
            box-sizing: border-box;
        }
        
         :root {
            --wacken-red: #e30613;
            --bg-black: #0a0a0a;
            --card-bg: #151515;
            --stone-texture: url('https://www.transparenttextures.com/patterns/dark-matter.png');
            --halftone: radial-gradient(circle, #333 1px, transparent 1px);
        }
        
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-black);
            background-image: var(--stone-texture);
            color: #efefef;
            margin: 0;
            padding: 20px;
        }
        
        header {
            background-color: var(--bg-black);
            border-bottom: 2px solid var(--wacken-red);
            padding: 30px 0;
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }
        
        header::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: var(--halftone);
            background-size: 10px 10px;
            opacity: 0.1;
            pointer-events: none;
        }
        
        #header-logo {
            display: block;
            width: 280px;
            height: auto;
            max-height: 120px;
            max-width: 90%;
            filter: drop-shadow(0 0 8px rgba(0, 0, 0, 0.8));
            transition: filter 0.3s ease-in-out;
            position: relative;
            z-index: 10;
        }
        
        #header-logo:hover {
            filter: drop-shadow(0 0 15px var(--wacken-red));
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            cursor: zoom-out;
        }
        
        .modal-content {
            margin: auto;
            display: block;
            max-width: 90%;
            max-height: 90%;
            position: relative;
            top: 50%;
            transform: translateY(-50%);
            border: 2px solid var(--wacken-red);
        }
        
        .collapsible-card {
            background: var(--card-bg);
            border: 1px solid #333;
            border-top: 4px solid var(--wacken-red);
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        
        .section-header {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.02);
            user-select: none;
        }
        
        .section-header label {
            margin: 0;
            cursor: pointer;
            color: var(--wacken-red);
            font-weight: 900;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        
        .toggle-icon::before {
            content: "[ - ]";
            font-family: monospace;
            color: #666;
        }
        
        .collapsed .toggle-icon::before {
            content: "[ + ]";
        }
        
        .collapsed .section-content {
            display: none;
        }
        
        .section-content {
            padding: 20px;
            border-top: 1px solid #222;
        }
        
        .controls-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            background: #111;
            padding: 20px;
            border: 1px solid #222;
            margin-bottom: 30px;
            background-image: linear-gradient(45deg, #111 25%, #151515 25%, #151515 50%, #111 50%, #111 75%, #151515 75%, #151515 100%);
            background-size: 4px 4px;
        }
        
        label {
            font-size: 11px;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 8px;
            display: block;
            font-weight: bold;
        }
        
        input[type="text"],
        select {
            background: #000;
            color: #fff;
            border: 1px solid #444;
            padding: 12px;
            font-size: 14px;
            width: 100%;
            outline: none;
        }
        
        input:focus,
        select:focus {
            border-color: var(--wacken-red);
        }
        
        .compare-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 10px;
            background: #000;
            border: 1px solid #333;
            max-height: 150px;
            overflow-y: auto;
        }
        
        .compare-item {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #222;
            border: 1px solid #444;
            padding: 5px 10px;
            font-size: 11px;
            text-transform: uppercase;
            cursor: pointer;
        }
        
        .compare-item:hover {
            background: var(--wacken-red);
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }
        
        .stat-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 12px;
            text-transform: uppercase;
        }
        
        .stat-bar-bg {
            background: #222;
            height: 8px;
            overflow: hidden;
        }
        
        .stat-bar-fill {
            background: var(--wacken-red);
            height: 100%;
            transition: width 0.6s ease;
        }
        
        .table-wrapper {
            width: 100%;
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th {
            color: var(--wacken-red);
            text-transform: uppercase;
            font-size: 12px;
            border-bottom: 2px solid var(--wacken-red);
            text-align: left;
            padding: 12px;
        }
        
        th.sortable {
            cursor: pointer;
            transition: background 0.2s;
        }
        
        th.sortable:hover {
            background: rgba(227, 6, 19, 0.1);
        }
        
        .sort-indicator {
            margin-left: 5px;
            font-size: 10px;
            color: #666;
        }
        
        td {
            padding: 12px;
            border-bottom: 1px solid #222;
        }
        
        .badge {
            color: #fff;
            padding: 2px 6px;
            font-size: 10px;
            font-weight: bold;
            margin-left: 8px;
            text-transform: uppercase;
        }
        
        .badge.metal-red {
            background: #e30613;
        }
        
        .badge.metal-orange {
            background: #f39c12;
        }
        
        .badge.metal-blue {
            background: #2980b9;
        }
        
        .badge.metal-green {
            background: #27ae60;
        }
        
        .badge.metal-purple {
            background: #8e44ad;
        }
        
        .badge.metal-yellow {
            background: #f1c40f;
            color: #000;
        }
        
        .badge.metal-cyan {
            background: #16a085;
        }
        
        .badge.metal-pink {
            background: #d81b60;
        }
        
        .badge.metal-white {
            background: #ecf0f1;
            color: #000;
        }
        
        .badge.metal-grey {
            background: #7f8c8d;
        }
        
        @media (max-width: 768px) {
            .controls-grid {
                grid-template-columns: 1fr;
            }
            .info-content-wrapper {
                flex-direction: column;
                align-items: center;
            }
            #info-poster {
                max-width: 100%;
            }
        }
        
         ::-webkit-scrollbar {
            width: 8px;
        }
        
         ::-webkit-scrollbar-track {
            background: var(--bg-black);
        }
        
         ::-webkit-scrollbar-thumb {
            background: var(--wacken-red);
        }
        
         ::-webkit-scrollbar-thumb:hover {
            background: #ff0000;
        }
    </style>
</head>

<body>
    <div id="poster-modal" class="modal">
        <img class="modal-content" id="modal-img">
    </div>

    <header>
        <a href="index.html">
            <img src="header.svg" alt="Mos Lineup Lab" id="header-logo">
        </a>
    </header>

    <div class="container">
        <div id="festival-info-card" class="collapsible-card" style="display:none;">
            <div class="section-header" onclick="toggleSection('festival-info-card')">
                <label>FESTIVAL DETAILS</label>
                <span class="toggle-icon"></span>
            </div>
            <div class="section-content">
                <div class="info-content-wrapper" style="display: flex; gap: 30px;">
                    <img id="info-poster" src="" alt="Poster" loading="lazy" style="max-width: 200px; border: 1px solid #444; cursor: zoom-in;">
                    <div class="info-text-side">
                        <h2 id="info-name" style="color: #fff; text-transform: uppercase; font-size: 24px; margin: 0 0 15px 0;"></h2>
                        <div style="display: flex; flex-direction: column; gap: 8px; font-size: 14px;">
                            <div><strong style="color:var(--wacken-red)">DATUM:</strong> <span id="info-date"></span></div>
                            <div><strong style="color:var(--wacken-red)">ORT:</strong> <span id="info-location"></span></div>
                            <div><strong style="color:var(--wacken-red)">PREIS:</strong> <span id="info-price"></span></div>
                            <div><strong style="color:var(--wacken-red)">WEB:</strong> <a id="info-link" href="#" target="_blank" style="color: #fff; text-decoration: underline;">OFFIZIELLE WEBSEITE</a></div>
                        </div>
                        <p id="info-desc" style="margin-top: 15px; color: #aaa; font-style: italic; font-size: 13px;"></p>
                    </div>
                </div>
            </div>
        </div>

        <div class="controls-grid">
            <div class="control-group">
                <label>Haupt-Festival & Suche</label>
                <select id="primary-select"><option>Lade Daten...</option></select>
                <input type="text" id="search-input" placeholder="Band oder Genre suchen...">
                <label style="margin-top:10px">Filter</label>
                <select id="display-filter">
                    <option value="all">Alle Bands</option>
                    <option value="exclusive">Nur exklusive Bands</option>
                    <option value="shared">Nur Überschneidungen</option>
                </select>
            </div>
            <div class="control-group">
                <label>Vergleichen mit...</label>
                <div id="compare-container" class="compare-list"></div>
            </div>
        </div>

        <div id="genre-stats-card" class="collapsible-card">
            <div class="section-header" onclick="toggleSection('genre-stats-card')">
                <label>LINEUP DNA (TOP 10 GENRES)</label>
                <span class="toggle-icon"></span>
            </div>
            <div class="section-content">
                <div id="stats-grid" class="stats-grid"></div>
            </div>
        </div>

        <div id="band-list-card" class="collapsible-card">
            <div class="section-header" onclick="toggleSection('band-list-card')">
                <label>LINEUP ÜBERSICHT</label>
                <span class="toggle-icon"></span>
            </div>
            <div class="section-content">
                <div id="stats" style="margin-bottom:15px; font-size:13px; color:#888; border-left:3px solid var(--wacken-red); padding-left:10px;">Status: Aktiv</div>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th style="width:40px"></th>
                                <th class="sortable" onclick="handleSort('name')">Band <span id="sort-name" class="sort-indicator"></span></th>
                                <th class="sortable" onclick="handleSort('genre')">Genre <span id="sort-genre" class="sort-indicator"></span></th>
                            </tr>
                        </thead>
                        <tbody id="band-table-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const GITHUB_USER = 'm0b4';
        const GITHUB_REPO = 'Festival_Overview';
        const DATA_FOLDER = 'data';

        const primarySelect = document.getElementById('primary-select');
        const compareContainer = document.getElementById('compare-container');
        const searchInput = document.getElementById('search-input');
        const displayFilter = document.getElementById('display-filter');
        const tableBody = document.getElementById('band-table-body');
        const stats = document.getElementById('stats');

        let allFestivalFiles = [];
        let primaryBands = [];
        let cachedComparisons = {};

        let currentSort = {
            column: 'name',
            direction: 'asc'
        };

        function toggleSection(id) {
            document.getElementById(id).classList.toggle('collapsed');
        }

        function handleSort(column) {
            if (currentSort.column === column) {
                currentSort.direction = currentSort.direction === 'asc' ? 'desc' : 'asc';
            } else {
                currentSort.column = column;
                currentSort.direction = 'asc';
            }
            renderTable();
        }

        function getFestivalColor(festivalPath) {
            const fileName = decodeURIComponent(festivalPath.split('/').pop());
            const info = (typeof festivalMetadata !== 'undefined') ? festivalMetadata[fileName] : null;
            return (info && info.color) ? info.color : "metal-grey";
        }

        function updateFestivalInfo(filePath) {
            const fileName = decodeURIComponent(filePath.split('/').pop());
            const info = (typeof festivalMetadata !== 'undefined') ? festivalMetadata[fileName] : null;
            const infoCard = document.getElementById('festival-info-card');

            if (info) {
                infoCard.style.display = 'block';
                document.getElementById('info-name').innerText = prettyName(fileName);
                document.getElementById('info-date').innerText = info.date || '-';
                document.getElementById('info-location').innerText = info.location || '-';
                document.getElementById('info-price').innerText = info.price || 'k.A.';
                document.getElementById('info-link').href = info.website || '#';
                document.getElementById('info-desc').innerText = info.description || '';

                const posterImg = document.getElementById('info-poster');
                const thumbSrc = info.poster_thumb || info.poster;

                if (thumbSrc) {
                    posterImg.src = thumbSrc;
                    posterImg.style.display = 'block';
                } else {
                    posterImg.style.display = 'none';
                }
                infoCard.classList.remove('collapsed');
            } else {
                infoCard.style.display = 'none';
            }
        }

        function getFlagImg(countryName) {
            if (!countryName) return '🏴';
            const code = typeof countryCodes !== 'undefined' ? countryCodes[countryName.trim().toLowerCase()] : null;
            return code ? `<img src="https://flagcdn.com/w40/${code}.png" style="width:20px;">` : '🏴';
        }

        function prettyName(filename) {
            return filename.replace('.json', '').replace(/_/g, ' ').split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
        }

        async function init() {
            try {
                const res = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${DATA_FOLDER}`);
                const files = await res.json();
                allFestivalFiles = files.filter(f => f.name.endsWith('.json'));

                primarySelect.innerHTML = '';
                allFestivalFiles.forEach(file => {
                    const opt = document.createElement('option');
                    opt.value = file.path;
                    opt.textContent = prettyName(file.name);
                    primarySelect.appendChild(opt);
                });

                if (primarySelect.options.length > 0) {
                    primarySelect.selectedIndex = primarySelect.options.length - 1;
                }

                updateCompareCheckboxes();
                loadPrimaryData();
            } catch (e) {
                stats.innerText = "GitHub-Ladefehler.";
            }
        }

        function updateCompareCheckboxes() {
            compareContainer.innerHTML = '';
            allFestivalFiles.forEach(file => {
                if (file.path === primarySelect.value) return;
                const label = document.createElement('label');
                label.className = 'compare-item';
                label.innerHTML = `<input type="checkbox" value="${file.path}"> ${prettyName(file.name)}`;
                label.querySelector('input').addEventListener('change', renderTable);
                compareContainer.appendChild(label);
            });
        }

        async function loadPrimaryData() {
            const filePath = primarySelect.value;
            updateFestivalInfo(filePath);
            const res = await fetch(filePath);
            primaryBands = await res.json();
            renderTable();
        }

        async function renderTable() {
            const searchTerm = searchInput.value.toLowerCase();
            const filterMode = displayFilter.value;
            const checkedCheckboxes = Array.from(compareContainer.querySelectorAll('input:checked'));

            let matchMap = {};
            for (let cb of checkedCheckboxes) {
                const path = cb.value;
                if (!cachedComparisons[path]) {
                    const res = await fetch(path);
                    const data = await res.json();
                    cachedComparisons[path] = new Set(data.map(b => b.name.toLowerCase().trim()));
                }
                cachedComparisons[path].forEach(name => {
                    if (!matchMap[name]) matchMap[name] = [];
                    matchMap[name].push({
                        name: prettyName(path.split('/').pop()),
                        color: getFestivalColor(path)
                    });
                });
            }

            let filteredBands = primaryBands.filter(band => {
                const lowName = (band.name || "").toLowerCase().trim();
                const matches = matchMap[lowName] || [];
                const isShared = matches.length > 0;

                if (filterMode === 'exclusive' && isShared) return false;
                if (filterMode === 'shared' && !isShared) return false;
                if (!band.name.toLowerCase().includes(searchTerm) && !band.genre.toLowerCase().includes(searchTerm)) return false;
                return true;
            });

            filteredBands.sort((a, b) => {
                let valA = a[currentSort.column].toLowerCase();
                let valB = b[currentSort.column].toLowerCase();
                if (currentSort.direction === 'asc') {
                    return valA < valB ? -1 : (valA > valB ? 1 : 0);
                } else {
                    return valA > valB ? -1 : (valA < valB ? 1 : 0);
                }
            });

            document.getElementById('sort-name').innerText = currentSort.column === 'name' ? (currentSort.direction === 'asc' ? '▲' : '▼') : '';
            document.getElementById('sort-genre').innerText = currentSort.column === 'genre' ? (currentSort.direction === 'asc' ? '▲' : '▼') : '';

            tableBody.innerHTML = '';
            let overlapCount = 0;
            let festivalOverlapCounts = {}; // NEU: Counter pro Festival

            filteredBands.forEach(band => {
                const lowName = (band.name || "").toLowerCase().trim();
                const matches = matchMap[lowName] || [];
                const isShared = matches.length > 0;

                if (isShared) {
                    overlapCount++;
                    // Jedes Festival in den Matches hochzählen
                    matches.forEach(m => {
                        festivalOverlapCounts[m.name] = (festivalOverlapCounts[m.name] || 0) + 1;
                    });
                }

                const row = document.createElement('tr');
                let badgesHtml = '';
                matches.forEach(m => {
                    badgesHtml += `<span class="badge ${m.color}">${m.name}</span>`;
                });

                row.innerHTML = `
                    <td>${getFlagImg(band.country)}</td>
                    <td><strong>${band.name}</strong>${badgesHtml}</td>
                    <td style="color:#666; font-size:12px">${band.genre}</td>
                `;
                tableBody.appendChild(row);
            });

            // --- NEU: Detaillierte Stats-Anzeige ---
            let statsHTML = `<strong>${filteredBands.length} BANDS</strong> GEFUNDEN (${overlapCount} ÜBERSCHNEIDUNGEN)`;

            if (Object.keys(festivalOverlapCounts).length > 0) {
                let breakdown = Object.entries(festivalOverlapCounts)
                    .map(([name, count]) => `${name}: ${count}`)
                    .join(' | ');
                statsHTML += ` <span style="color:#666; font-size:11px; margin-left:15px; letter-spacing:0.5px;">[ ${breakdown} ]</span>`;
            }

            stats.innerHTML = statsHTML;
            updateGenreStats(filteredBands);
        }

        function updateGenreStats(displayedBands) {
            const statsGrid = document.getElementById('stats-grid');
            if (!displayedBands || displayedBands.length === 0) {
                statsGrid.innerHTML = 'Keine Daten.';
                return;
            }
            const counts = {};
            displayedBands.forEach(band => {
                const genre = band.genre || "Unknown";
                counts[genre] = (counts[genre] || 0) + 1;
            });
            const total = displayedBands.length;
            const sortedGenres = Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, 10);

            statsGrid.innerHTML = '';
            sortedGenres.forEach(([genre, count]) => {
                const percentage = Math.round((count / total) * 100);
                statsGrid.innerHTML += `
                    <div class="stat-item">
                        <div class="stat-info"><span>${genre}</span><span>${percentage} %</span></div>
                        <div class="stat-bar-bg"><div class="stat-bar-fill" style="width: ${percentage}%"></div></div>
                    </div>`;
            });
        }

        primarySelect.addEventListener('change', () => {
            updateCompareCheckboxes();
            loadPrimaryData();
        });
        searchInput.addEventListener('input', renderTable);
        displayFilter.addEventListener('change', renderTable);

        window.onclick = function(e) {
            const modal = document.getElementById('poster-modal');
            if (e.target == modal) modal.style.display = "none";
        }

        document.getElementById('info-poster').onclick = function() {
            const modal = document.getElementById('poster-modal');
            const modalImg = document.getElementById('modal-img');
            const filePath = primarySelect.value;
            const fileName = decodeURIComponent(filePath.split('/').pop());
            const info = (typeof festivalMetadata !== 'undefined') ? festivalMetadata[fileName] : null;

            if (info && (info.poster_full || info.poster)) {
                modal.style.display = "block";
                modalImg.src = info.poster_full || info.poster;
            }
        }

        init();
    </script>
</body>

</html>
