<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metal Festival Comparison 2026</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
        }
        
        header {
            border-bottom: 3px solid #f39c12;
            padding: 20px 0;
            margin-bottom: 30px;
            text-align: center;
        }
        
        h1 {
            color: #f39c12;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .controls {
            text-align: center;
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        select {
            background-color: #252525;
            color: #f39c12;
            border: 1px solid #f39c12;
            padding: 10px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
        }
        
        .compare-box {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            background: #252525;
            padding: 10px 15px;
            border-radius: 4px;
            border: 1px solid #444;
        }
        
        main {
            max-width: 1000px;
            margin: 0 auto;
            background: #1e1e1e;
            padding: 30px;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th,
        td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid #333;
        }
        
        th {
            background-color: #252525;
            color: #f39c12;
            text-transform: uppercase;
            font-size: 14px;
        }
        /* Flaggen-Styling */
        
        .flag-icon {
            width: 24px;
            height: auto;
            border-radius: 2px;
            vertical-align: middle;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.5);
        }
        
        .col-country {
            width: 50px;
            text-align: center;
        }
        
        .shared-band {
            background-color: rgba(46, 204, 113, 0.1) !important;
        }
        
        .badge {
            background: #2ecc71;
            color: #000;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 10px;
            font-weight: bold;
            margin-left: 10px;
        }
        
        tr:hover {
            background-color: #282828;
        }
        
        .band-name {
            color: #ffffff;
            font-weight: 600;
        }
    </style>
</head>

<body>

    <header>
        <h1>Festival Comparison 2026</h1>
    </header>

    <div class="controls">
        <select id="festival-select">
        <option value="wacken_2026_sortiert.json">Wacken 2026</option>
        <option value="hellfest_2026_sortiert.json">Hellfest 2026</option>
    </select>

        <label class="compare-box">
        <input type="checkbox" id="compare-toggle"> 
        <span>Vergleichs-Modus</span>
    </label>
    </div>

    <main>
        <div id="stats" style="margin-bottom: 15px; font-size: 14px; color: #888; font-style: italic;"></div>
        <table>
            <thead>
                <tr>
                    <th class="col-country"></th>
                    <th>Band</th>
                    <th>Genre</th>
                </tr>
            </thead>
            <tbody id="band-table-body"></tbody>
        </table>
    </main>

    <script>
        const select = document.getElementById('festival-select');
        const toggle = document.getElementById('compare-toggle');
        const tableBody = document.getElementById('band-table-body');
        const stats = document.getElementById('stats');

        // Übersetzungstabelle: Landname im JSON -> ISO Code für Flagge
        const countryCodes = {
            "Germany": "de",
            "Sweden": "se",
            "USA": "us",
            "United Kingdom": "gb",
            "France": "fr",
            "Norway": "no",
            "Finland": "fi",
            "Switzerland": "ch",
            "Austria": "at",
            "Belgium": "be",
            "Netherlands": "nl",
            "Italy": "it",
            "Spain": "es",
            "Poland": "pl",
            "Brazil": "br",
            "Canada": "ca",
            "Denmark": "dk",
            "Australia": "au",
            "Japan": "jp"
                // Du kannst hier weitere Länder hinzufügen
        };

        function getFlagImg(countryName) {
            const code = countryCodes[countryName.trim()] || null;
            if (!code) return `<span title="${countryName}">🏴‍☠️</span>`; // Piratenflagge als Platzhalter
            return `<img src="https://flagcdn.com/w40/${code}.png" class="flag-icon" title="${countryName}" alt="${countryName}">`;
        }

            tableBody.innerHTML = '<tr><td colspan="3" style="text-align:center;">Lade Lineup...</td></tr>';

            try {
                const primaryFile = select.value;
                const res1 = await fetch(primaryFile);
                const bands1 = await res1.json();

                let sharedNames = new Set();

                if (toggle.checked) {
                    const secondaryFile = (primaryFile === 'wacken_2026_sortiert.json') ?
                        'hellfest_2026_sortiert.json' :
                        'wacken_2026_sortiert.json';

                    const res2 = await fetch(secondaryFile);
                    const bands
