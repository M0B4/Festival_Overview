<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metal Festival Comparison 2026</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
        }
        
        header {
            border-bottom: 3px solid #f39c12;
            padding: 20px 0;
            margin-bottom: 30px;
            text-align: center;
        }
        
        h1 {
            color: #f39c12;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .controls {
            text-align: center;
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        select {
            background-color: #252525;
            color: #f39c12;
            border: 1px solid #f39c12;
            padding: 10px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
        }
        
        .compare-box {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            background: #252525;
            padding: 10px 15px;
            border-radius: 4px;
            border: 1px solid #444;
        }
        
        main {
            max-width: 1000px;
            margin: 0 auto;
            background: #1e1e1e;
            padding: 30px;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th,
        td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid #333;
        }
        
        th {
            background-color: #252525;
            color: #f39c12;
            text-transform: uppercase;
            font-size: 14px;
        }
        
        .flag-icon {
            width: 24px;
            height: auto;
            border-radius: 2px;
            vertical-align: middle;
        }
        
        .col-country {
            width: 50px;
            text-align: center;
        }
        
        .shared-band {
            background-color: rgba(46, 204, 113, 0.1) !important;
        }
        
        .badge {
            background: #2ecc71;
            color: #000;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 10px;
            font-weight: bold;
            margin-left: 10px;
        }
        
        tr:hover {
            background-color: #282828;
        }
        
        .band-name {
            color: #ffffff;
            font-weight: 600;
        }
    </style>
</head>

<body>

    <header>
        <h1>Festival Comparison 2026</h1>
    </header>

    <div class="controls">
        <select id="festival-select">
        <option value="wacken_2026_sortiert.json">Wacken 2026</option>
        <option value="hellfest_2026_sortiert.json">Hellfest 2026</option>
    </select>

        <label class="compare-box">
        <input type="checkbox" id="compare-toggle"> 
        <span>Vergleichs-Modus</span>
    </label>
    </div>

    <main>
        <div id="stats" style="margin-bottom: 15px; font-size: 14px; color: #888;"></div>
        <table>
            <thead>
                <tr>
                    <th class="col-country"></th>
                    <th>Band</th>
                    <th>Genre</th>
                </tr>
            </thead>
            <tbody id="band-table-body"></tbody>
        </table>
    </main>

    <script>
        const select = document.getElementById('festival-select');
        const toggle = document.getElementById('compare-toggle');
        const tableBody = document.getElementById('band-table-body');
        const stats = document.getElementById('stats');

        // Erweitertes Mapping
        const countryCodes = {
            "germany": "de",
            "sweden": "se",
            "usa": "us",
            "united kingdom": "gb",
            "france": "fr",
            "norway": "no",
            "finland": "fi",
            "switzerland": "ch",
            "austria": "at",
            "belgium": "be",
            "netherlands": "nl",
            "italy": "it",
            "spain": "es",
            "poland": "pl",
            "brazil": "br",
            "canada": "ca",
            "denmark": "dk",
            "australia": "au",
            "japan": "jp",
            "greece": "gr",
            "ireland": "ie"
        };

        function getFlagImg(countryName) {
            if (!countryName) return '🏴‍☠️';
            const cleanName = countryName.trim().toLowerCase();
            const code = countryCodes[cleanName] || null;
            if (!code) return `<span title="${countryName}">🏴‍☠️</span>`;
            return `<img src="https://flagcdn.com/w40/${code}.png" class="flag-icon" title="${countryName}">`;
        }

        async function loadAndCompare() {
            tableBody.innerHTML = '<tr><td colspan="3" style="text-align:center;">Lade Lineup...</td></tr>';

            try {
                // 1. Primäres Festival laden
                const primaryFile = select.value;
                const res1 = await fetch(primaryFile);
                if (!res1.ok) throw new Error(`Datei ${primaryFile} nicht gefunden`);
                const bands1 = await res1.json();

                let sharedNames = new Set();

                // 2. Optionaler Vergleich (mit Fehler-Schutz)
                if (toggle.checked) {
                    try {
                        const secondaryFile = (primaryFile === 'wacken_2026_sortiert.json') ?
                            'hellfest_2026_sortiert.json' :
                            'wacken_2026_sortiert.json';

                        const res2 = await fetch(secondaryFile);
                        if (res2.ok) {
                            const bands2 = await res2.json();
                            const names2 = new Set(bands2.map(b => b.name.toLowerCase().trim()));
                            sharedNames = new Set(bands1.filter(b => names2.has(b.name.toLowerCase().trim())).map(b => b.name.toLowerCase().trim()));
                            stats.innerText = `${sharedNames.size} Überschneidungen gefunden.`;
                        } else {
                            stats.innerText = "Zweite Datei für Vergleich nicht gefunden.";
                        }
                    } catch (e) {
                        console.warn("Vergleichsdatei konnte nicht geladen werden.");
                    }
                } else {
                    stats.innerText = `${bands1.length} Bands bestätigt.`;
                }

                // 3. Tabelle rendern
                tableBody.innerHTML = '';
                bands1.forEach(band => {
                    const bName = (band.name || "Unbekannt").trim();
                    const isShared = sharedNames.has(bName.toLowerCase());

                    const row = document.createElement('tr');
                    if (isShared) row.classList.add('shared-band');

                    row.innerHTML = `
                    <td class="col-country">${getFlagImg(band.country)}</td>
                    <td class="band-name">
                        ${bName} 
                        ${isShared ? '<span class="badge">DOPPELT</span>' : ''}
                    </td>
                    <td>${band.genre || "N/A"}</td>
                `;
                    tableBody.appendChild(row);
                });

            } catch (error) {
                console.error(error);
                tableBody.innerHTML = `<tr><td colspan="3" style="text-align:center; color:red;">Fehler: ${error.message}</td></tr>`;
            }
        }

        select.addEventListener('change', loadAndCompare);
        toggle.addEventListener('change', loadAndCompare);
        loadAndCompare();
    </script>

</body>

</html>
