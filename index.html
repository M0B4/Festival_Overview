<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mos Lineup Lab</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.0/color-thief.umd.js"></script>
    <script src="countries.js"></script>
    <script src="festivals.js"></script>

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="poster-modal" class="modal">
        <img class="modal-content" id="modal-img">
    </div>

    <header>
        <a href="index.html">
            <img src="header.svg" alt="Mos Lineup Lab" id="header-logo">
        </a>
    </header>

    <div class="container">
        <div id="festival-info-card" class="collapsible-card" style="display:none;">
            <div class="section-header" onclick="toggleSection('festival-info-card')">
                <label>FESTIVAL DETAILS</label>
                <span class="toggle-icon"></span>
            </div>
            <div class="section-content">
                <div class="info-content-wrapper">
                    <img id="info-poster" src="" alt="Poster" loading="lazy">
                    <div class="info-text-side">
                        <h2 id="info-name"></h2>
                        <div class="info-grid">
                            <div><strong class="highlight">DATUM:</strong> <span id="info-date"></span></div>
                            <div><strong class="highlight">ORT:</strong> <span id="info-location"></span></div>
                            <div><strong class="highlight">PREIS:</strong> <span id="info-price"></span></div>
                            <div><strong class="highlight">WEB:</strong> <a id="info-link" href="#" target="_blank">OFFIZIELLE WEBSEITE</a></div>
                        </div>
                        <p id="info-desc"></p>
                    </div>
                </div>
            </div>
        </div>

        <div class="controls-grid">
            <div class="control-group">
                <label>Haupt-Festival & Suche</label>
                <select id="primary-select"></select>
                <input type="text" id="search-input" placeholder="Band oder Genre suchen...">
                <label style="margin-top:10px">Filter</label>
                <select id="display-filter">
                    <option value="all">Alle Bands</option>
                    <option value="exclusive">Nur exklusive Bands</option>
                    <option value="shared">Nur Überschneidungen</option>
                </select>
            </div>
            <div class="control-group">
                <label>Vergleichen mit...</label>
                <div id="compare-container" class="compare-list"></div>
            </div>
        </div>

        <div id="genre-stats-card" class="collapsible-card">
            <div class="section-header" onclick="toggleSection('genre-stats-card')">
                <label>LINEUP DNA (TOP 10 GENRES)</label>
                <span class="toggle-icon"></span>
            </div>
            <div class="section-content">
                <div id="stats-grid" class="stats-grid"></div>
            </div>
        </div>

        <div id="band-list-card" class="collapsible-card">
            <div class="section-header" onclick="toggleSection('band-list-card')">
                <label>LINEUP ÜBERSICHT</label>
                <span class="toggle-icon"></span>
            </div>
            <div class="section-content">
                <div id="stats">Status: Aktiv</div>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th style="width:40px"></th>
                                <th class="sortable" onclick="handleSort('name')">Band <span id="sort-name"></span></th>
                                <th class="sortable" onclick="handleSort('genre')">Genre <span id="sort-genre"></span></th>
                            </tr>
                        </thead>
                        <tbody id="band-table-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
