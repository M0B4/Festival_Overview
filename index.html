<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metal Festival Comparison 2026</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
        }
        
        header {
            border-bottom: 3px solid #f39c12;
            padding: 20px 0;
            margin-bottom: 30px;
            text-align: center;
        }
        
        h1 {
            color: #f39c12;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0;
        }
        
        .controls {
            text-align: center;
            margin-bottom: 25px;
        }
        
        select {
            background-color: #252525;
            color: #f39c12;
            border: 1px solid #f39c12;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
        }
        
        main {
            max-width: 1000px;
            margin: 0 auto;
            background: #1e1e1e;
            padding: 30px;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th,
        td {
            text-align: left;
            padding: 15px;
            border-bottom: 1px solid #333;
        }
        
        th {
            background-color: #252525;
            color: #f39c12;
            text-transform: uppercase;
        }
        
        tr:hover {
            background-color: #282828;
        }
        
        .band-name {
            color: #ffffff;
            font-weight: 600;
        }
    </style>
</head>

<body>

    <header>
        <h1>Festival Lineup Tracker</h1>
    </header>

    <div class="controls">
        <select id="festival-select">
        <option value="wacken_2026_sortiert.json">Wacken Open Air 2026</option>
        <option value="hellfest_2026_sortiert.json">Hellfest 2026</option>
    </select>
    </div>

    <main>
        <table>
            <thead>
                <tr>
                    <th>Band</th>
                    <th>Country</th>
                    <th>Genre</th>
                </tr>
            </thead>
            <tbody id="band-table-body">
            </tbody>
        </table>
    </main>

    <script>
        const select = document.getElementById('festival-select');
        const tableBody = document.getElementById('band-table-body');

        async function loadLineup(filename) {
            tableBody.innerHTML = '<tr><td colspan="3" style="text-align:center;">Lade Daten...</td></tr>';

            try {
                const response = await fetch(filename);
                if (!response.ok) throw new Error('Datei nicht gefunden');

                const bands = await response.json();
                tableBody.innerHTML = ''; // Lade-Text entfernen

                bands.forEach(band => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                    <td class="band-name">${band.name}</td>
                    <td>${band.country}</td>
                    <td>${band.genre}</td>
                `;
                    tableBody.appendChild(row);
                });
            } catch (error) {
                console.error('Fehler:', error);
                tableBody.innerHTML = '<tr><td colspan="3" style="text-align:center; color:red;">Daten konnten nicht geladen werden. Prüfe, ob die Datei online ist.</td></tr>';
            }
        }

        // Event Listener für den Wechsel im Dropdown
        select.addEventListener('change', (e) => {
            loadLineup(e.target.value);
        });

        // Initiales Laden beim ersten Aufruf
        loadLineup(select.value);
    </script>

</body>

</html>
