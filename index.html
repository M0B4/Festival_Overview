<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metal Festival Comparison 2026</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
        }
        
        header {
            border-bottom: 3px solid #f39c12;
            padding: 20px 0;
            margin-bottom: 30px;
            text-align: center;
        }
        
        h1 {
            color: #f39c12;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .controls {
            text-align: center;
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        select {
            background-color: #252525;
            color: #f39c12;
            border: 1px solid #f39c12;
            padding: 10px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
        }
        /* Checkbox Styling */
        
        .compare-box {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            background: #252525;
            padding: 10px 15px;
            border-radius: 4px;
            border: 1px solid #444;
        }
        
        .compare-box:hover {
            border-color: #f39c12;
        }
        
        main {
            max-width: 1000px;
            margin: 0 auto;
            background: #1e1e1e;
            padding: 30px;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th,
        td {
            text-align: left;
            padding: 15px;
            border-bottom: 1px solid #333;
        }
        
        th {
            background-color: #252525;
            color: #f39c12;
            text-transform: uppercase;
        }
        /* Highlight für Überschneidungen */
        
        .shared-band {
            background-color: rgba(46, 204, 113, 0.15) !important;
        }
        
        .shared-band td {
            border-bottom-color: #2ecc71;
        }
        
        .badge {
            background: #2ecc71;
            color: #000;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 10px;
            font-weight: bold;
            margin-left: 10px;
            vertical-align: middle;
        }
        
        tr:hover {
            background-color: #282828;
        }
        
        .band-name {
            color: #ffffff;
            font-weight: 600;
        }
    </style>
</head>

<body>

    <header>
        <h1>Festival Comparison 2026</h1>
    </header>

    <div class="controls">
        <div>
            <label>Festival: </label>
            <select id="festival-select">
            <option value="wacken_2026_sortiert.json">Wacken 2026</option>
            <option value="hellfest_2026_sortiert.json">Hellfest 2026</option>
        </select>
        </div>

        <label class="compare-box">
        <input type="checkbox" id="compare-toggle"> 
        <span>Mit anderem Festival vergleichen</span>
    </label>
    </div>

    <main>
        <div id="stats" style="margin-bottom: 10px; font-size: 14px; color: #aaa;"></div>
        <table>
            <thead>
                <tr>
                    <th>Band</th>
                    <th>Country</th>
                    <th>Genre</th>
                </tr>
            </thead>
            <tbody id="band-table-body"></tbody>
        </table>
    </main>

    <script>
        const select = document.getElementById('festival-select');
        const toggle = document.getElementById('compare-toggle');
        const tableBody = document.getElementById('band-table-body');
        const stats = document.getElementById('stats');

        async function loadAndCompare() {
            tableBody.innerHTML = '<tr><td colspan="3" style="text-align:center;">Lade Daten...</td></tr>';

            try {
                // 1. Primäres Festival laden
                const primaryFile = select.value;
                const res1 = await fetch(primaryFile);
                const bands1 = await res1.json();

                let sharedNames = new Set();

                // 2. Optional: Das andere Festival laden, wenn Checkbox aktiv ist
                if (toggle.checked) {
                    // Finde heraus, welches das "andere" Festival ist
                    const secondaryFile = (primaryFile === 'wacken_2026_sortiert.json') ?
                        'hellfest_2026_sortiert.json' :
                        'wacken_2026_sortiert.json';

                    const res2 = await fetch(secondaryFile);
                    const bands2 = await res2.json();

                    // Erstelle ein Set mit Namen für schnellen Abgleich
                    const names2 = new Set(bands2.map(b => b.name.toLowerCase()));
                    sharedNames = new Set(bands1.filter(b => names2.has(b.name.toLowerCase())).map(b => b.name.toLowerCase()));

                    stats.innerText = `${sharedNames.size} Überschneidungen gefunden.`;
                } else {
                    stats.innerText = `${bands1.length} Bands insgesamt.`;
                }

                // 3. Tabelle rendern
                tableBody.innerHTML = '';
                bands1.forEach(band => {
                    const isShared = sharedNames.has(band.name.toLowerCase());
                    const row = document.createElement('tr');
                    if (isShared) row.classList.add('shared-band');

                    row.innerHTML = `
                    <td class="band-name">
                        ${band.name} 
                        ${isShared ? '<span class="badge">AUCH BEIM ANDEREN</span>' : ''}
                    </td>
                    <td>${band.country}</td>
                    <td>${band.genre}</td>
                `;
                    tableBody.appendChild(row);
                });

            } catch (error) {
                tableBody.innerHTML = '<tr><td colspan="3" style="text-align:center; color:red;">Fehler beim Laden.</td></tr>';
            }
        }

        select.addEventListener('change', loadAndCompare);
        toggle.addEventListener('change', loadAndCompare);
        loadAndCompare();
    </script>

</body>

</html>
