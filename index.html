<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metal Festival Hub 2026</title>
    <script src="countries.js"></script>
    <style>
         :root {
            --metal-orange: #f39c12;
            --bg-dark: #121212;
            --card-bg: #1e1e1e;
        }
        
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-dark);
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
        }
        
        header {
            border-bottom: 3px solid var(--metal-orange);
            padding: 20px 0;
            margin-bottom: 20px;
            text-align: center;
        }
        
        h1 {
            color: var(--metal-orange);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0;
        }
        
        .container {
            max-width: 1100px;
            margin: 0 auto;
        }
        
        .controls-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #333;
        }
        
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        label {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--metal-orange);
            font-weight: bold;
        }
        
        input[type="text"],
        select {
            background: #252525;
            color: white;
            border: 1px solid #444;
            padding: 12px;
            border-radius: 4px;
            font-size: 15px;
        }
        
        input[type="text"]:focus,
        select:focus {
            border-color: var(--metal-orange);
            outline: none;
        }
        
        .compare-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding: 10px;
            background: #181818;
            border-radius: 4px;
            max-height: 150px;
            overflow-y: auto;
            border: 1px solid #333;
        }
        
        .compare-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            background: #252525;
            padding: 5px 10px;
            border-radius: 20px;
            border: 1px solid #444;
            cursor: pointer;
        }
        
        main {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th,
        td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid #333;
        }
        
        th {
            background-color: #252525;
            color: var(--metal-orange);
            text-transform: uppercase;
            font-size: 13px;
            position: sticky;
            top: 0;
        }
        
        .flag-icon {
            width: 24px;
            border-radius: 2px;
        }
        
        .shared-band {
            background-color: rgba(46, 204, 113, 0.05);
        }
        
        .badge-container {
            display: inline-flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-left: 8px;
            vertical-align: middle;
        }
        
        .badge {
            color: #000;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 10px;
            font-weight: bold;
            white-space: nowrap;
        }
        /* Badge Farben */
        
        .badge.metal-orange {
            background: #f39c12;
        }
        
        .badge.metal-red {
            background: #e74c3c;
            color: white;
        }
        
        .badge.metal-blue {
            background: #3498db;
            color: white;
        }
        
        .badge.metal-purple {
            background: #9b59b6;
            color: white;
        }
        
        .badge.metal-grey {
            background: #7f8c8d;
            color: white;
        }
        
        .band-name {
            color: #ffffff;
            font-weight: 600;
        }
        
        #stats {
            margin-bottom: 15px;
            font-size: 14px;
            color: #888;
            border-left: 3px solid var(--metal-orange);
            padding-left: 10px;
        }
        
        @media (max-width: 768px) {
            .controls-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <h1>Festival Hub 2026</h1>
        </header>

        <div class="controls-grid">
            <div class="control-group">
                <label>Haupt-Festival & Suche</label>
                <select id="primary-select"><option>Lade...</option></select>
                <input type="text" id="search-input" placeholder="Band oder Genre suchen...">

                <label style="margin-top:5px;">Anzeige-Filter</label>
                <select id="display-filter">
                <option value="all">Alle Bands anzeigen</option>
                <option value="exclusive">Nur exklusive Bands (Einzigartig)</option>
                <option value="shared">Nur Überschneidungen (Duplicates)</option>
            </select>
            </div>

            <div class="control-group">
                <label>Vergleichen mit...</label>
                <div id="compare-container" class="compare-list"></div>
                <p style="font-size: 10px; color: #666; margin: 0;">* Wähle Festivals aus, um Exklusivität zu berechnen.</p>
            </div>
        </div>

        <main>
            <div id="stats">Initialisierung...</div>
            <table>
                <thead>
                    <tr>
                        <th style="width:40px"></th>
                        <th>Band</th>
                        <th>Genre</th>
                    </tr>
                </thead>
                <tbody id="band-table-body"></tbody>
            </table>
        </main>
    </div>

    <script>
        // --- KONFIGURATION (Bitte anpassen!) ---
        const GITHUB_USER = 'm0b4'; // Ändern!
        const GITHUB_REPO = 'Festival_Overview'; // Ändern!
        const DATA_FOLDER = 'data'; // Ordnername, in dem die JSONs liegen

        const primarySelect = document.getElementById('primary-select');
        const compareContainer = document.getElementById('compare-container');
        const searchInput = document.getElementById('search-input');
        const displayFilter = document.getElementById('display-filter');
        const tableBody = document.getElementById('band-table-body');
        const stats = document.getElementById('stats');

        let allFestivalFiles = [];
        let primaryBands = [];
        let cachedComparisons = {};
        const colorPallet = ["metal-orange", "metal-red", "metal-blue", "metal-purple", "metal-grey"];
        let festivalColors = {};

        // Vollständige Länderliste (hier gekürzt für Platz, nimm deine 190er Liste)



        function getFlagImg(countryName) {
            if (!countryName) return '🏴';
            const code = countryCodes[countryName.trim().toLowerCase()];
            return code ? `<img src="https://flagcdn.com/w40/${code}.png" class="flag-icon">` : '🏴';
        }

        function prettyName(filename) {
            return filename.replace('.json', '').replace(/_/g, ' ').split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
        }

        function getFestivalColor(festivalPath) {
            if (!festivalColors[festivalPath]) {
                const index = allFestivalFiles.findIndex(f => f.path === festivalPath);
                festivalColors[festivalPath] = colorPallet[index % colorPallet.length];
            }
            return festivalColors[festivalPath];
        }

        async function init() {
            try {
                const res = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${DATA_FOLDER}`);
                const files = await res.json();
                allFestivalFiles = files.filter(f => f.name.endsWith('.json'));
                primarySelect.innerHTML = '';
                allFestivalFiles.forEach(file => {
                    const opt = document.createElement('option');
                    opt.value = file.path;
                    opt.textContent = prettyName(file.name);
                    primarySelect.appendChild(opt);
                });
                updateCompareCheckboxes();
                loadPrimaryData();
            } catch (e) {
                stats.innerText = "Fehler beim Laden.";
            }
        }

        function updateCompareCheckboxes() {
            compareContainer.innerHTML = '';
            allFestivalFiles.forEach(file => {
                if (file.path === primarySelect.value) return;
                const label = document.createElement('label');
                label.className = 'compare-item';
                label.innerHTML = `<input type="checkbox" value="${file.path}"> ${prettyName(file.name)}`;
                label.querySelector('input').addEventListener('change', renderTable);
                compareContainer.appendChild(label);
            });
        }

        async function loadPrimaryData() {
            const res = await fetch(primarySelect.value);
            primaryBands = await res.json();
            renderTable();
        }

        async function renderTable() {
            const searchTerm = searchInput.value.toLowerCase();
            const filterMode = displayFilter.value;
            const checkedCheckboxes = Array.from(compareContainer.querySelectorAll('input:checked'));

            let matchMap = {};

            for (let cb of checkedCheckboxes) {
                const path = cb.value;
                if (!cachedComparisons[path]) {
                    const res = await fetch(path);
                    const data = await res.json();
                    cachedComparisons[path] = new Set(data.map(b => b.name.toLowerCase().trim()));
                }
                cachedComparisons[path].forEach(name => {
                    if (!matchMap[name]) matchMap[name] = [];
                    matchMap[name].push({
                        name: prettyName(path.split('/').pop()),
                        color: getFestivalColor(path)
                    });
                });
            }

            tableBody.innerHTML = '';
            let displayedCount = 0;
            let overlapCount = 0;

            primaryBands.forEach(band => {
                const lowName = (band.name || "").toLowerCase().trim();
                const matches = matchMap[lowName] || [];
                const isShared = matches.length > 0;

                // --- FILTER LOGIK ---
                if (filterMode === 'exclusive' && isShared) return;
                if (filterMode === 'shared' && !isShared) return;

                // Suche
                if (!band.name.toLowerCase().includes(searchTerm) && !band.genre.toLowerCase().includes(searchTerm)) return;

                displayedCount++;
                if (isShared) overlapCount++;

                const row = document.createElement('tr');
                if (isShared) row.classList.add('shared-band');

                let badgesHtml = '<div class="badge-container">';
                matches.forEach(m => {
                    badgesHtml += `<span class="badge ${m.color}">${m.name}</span>`;
                });
                badgesHtml += '</div>';

                row.innerHTML = `
                <td>${getFlagImg(band.country)}</td>
                <td class="band-name">${band.name}${isShared ? badgesHtml : ''}</td>
                <td>${band.genre}</td>
            `;
                tableBody.appendChild(row);
            });

            stats.innerText = `${displayedCount} Bands angezeigt (${overlapCount} Überschneidungen).`;
        }

        primarySelect.addEventListener('change', () => {
            updateCompareCheckboxes();
            loadPrimaryData();
        });
        searchInput.addEventListener('input', renderTable);
        displayFilter.addEventListener('change', renderTable);
        init();
    </script>
</body>

</html>
