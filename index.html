<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metal Festival Comparison 2026</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
        }
        
        header {
            border-bottom: 3px solid #f39c12;
            padding: 20px 0;
            margin-bottom: 30px;
            text-align: center;
        }
        
        h1 {
            color: #f39c12;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .controls {
            text-align: center;
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        select {
            background-color: #252525;
            color: #f39c12;
            border: 1px solid #f39c12;
            padding: 10px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            min-width: 200px;
        }
        
        .compare-box {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            background: #252525;
            padding: 10px 15px;
            border-radius: 4px;
            border: 1px solid #444;
        }
        
        main {
            max-width: 1000px;
            margin: 0 auto;
            background: #1e1e1e;
            padding: 30px;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th,
        td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid #333;
        }
        
        th {
            background-color: #252525;
            color: #f39c12;
            text-transform: uppercase;
        }
        
        .flag-icon {
            width: 24px;
            border-radius: 2px;
        }
        
        .shared-band {
            background-color: rgba(46, 204, 113, 0.1) !important;
        }
        
        .badge {
            background: #2ecc71;
            color: #000;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 10px;
            font-weight: bold;
            margin-left: 10px;
        }
        
        .band-name {
            color: #ffffff;
            font-weight: 600;
        }
    </style>
</head>

<body>

    <header>
        <h1>Festival Tracker 2026</h1>
    </header>

    <div class="controls">
        <select id="festival-select">
        <option value="">Lade Festivals...</option>
    </select>

        <label class="compare-box">
        <input type="checkbox" id="compare-toggle"> 
        <span>Vergleichs-Modus</span>
    </label>
    </div>

    <main>
        <div id="stats" style="margin-bottom: 15px; font-size: 14px; color: #888;"></div>
        <table>
            <thead>
                <tr>
                    <th style="width:50px"></th>
                    <th>Band</th>
                    <th>Genre</th>
                </tr>
            </thead>
            <tbody id="band-table-body"></tbody>
        </table>
    </main>

    <script>
        // --- KONFIGURATION ---
        const GITHUB_USER = 'm0b4'; // Ändern!
        const GITHUB_REPO = 'Festival_Overview'; // Ändern!
        const DATA_FOLDER = 'data'; // Ordnername, in dem die JSONs liegen

        const select = document.getElementById('festival-select');
        const toggle = document.getElementById('compare-toggle');
        const tableBody = document.getElementById('band-table-body');
        const stats = document.getElementById('stats');

        const countryCodes = {
            "germany": "de",
            "sweden": "se",
            "usa": "us",
            "united kingdom": "gb",
            "france": "fr",
            "norway": "no",
            "finland": "fi",
            "switzerland": "ch",
            "austria": "at",
            "belgium": "be",
            "netherlands": "nl",
            "italy": "it",
            "spain": "es",
            "poland": "pl",
            "brazil": "br",
            "canada": "ca",
            "denmark": "dk",
            "australia": "au",
            "japan": "jp"
        };

        function getFlagImg(countryName) {
            if (!countryName) return '🏴‍☠️';
            const code = countryCodes[countryName.trim().toLowerCase()];
            return code ? `<img src="https://flagcdn.com/w40/${code}.png" class="flag-icon" title="${countryName}">` : '🏴‍☠️';
        }

        // 1. Automatisch alle JSON-Dateien aus dem Ordner finden
        async function fetchFestivalFiles() {
            const apiUrl = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${DATA_FOLDER}`;

            try {
                const response = await fetch(apiUrl);
                const files = await response.json();

                // Filtern: Nur .json Dateien
                const jsonFiles = files.filter(file => file.name.endsWith('.json'));

                select.innerHTML = ''; // "Lade..." entfernen

                jsonFiles.forEach(file => {
                    const option = document.createElement('option');
                    option.value = file.path; // z.B. data/wacken.json

                    // Namen hübsch machen: wacken_2026.json -> Wacken 2026
                    let prettyName = file.name.replace('.json', '').replace(/_/g, ' ');
                    prettyName = prettyName.charAt(0).toUpperCase() + prettyName.slice(1);

                    option.textContent = prettyName;
                    select.appendChild(option);
                });

                if (jsonFiles.length > 0) loadAndCompare();

            } catch (e) {
                console.error("API Fehler:", e);
                select.innerHTML = '<option>Fehler beim Laden</option>';
            }
        }

        // 2. Daten laden und vergleichen
        async function loadAndCompare() {
            if (!select.value) return;
            tableBody.innerHTML = '<tr><td colspan="3" style="text-align:center;">Lade Lineup...</td></tr>';

            try {
                const res1 = await fetch(select.value);
                const bands1 = await res1.json();
                let sharedNames = new Set();

                if (toggle.checked && select.options.length > 1) {
                    // Nimm einfach das erste andere Festival aus der Liste zum Vergleichen
                    const otherIdx = select.selectedIndex === 0 ? 1 : 0;
                    const otherFile = select.options[otherIdx].value;

                    const res2 = await fetch(otherFile);
                    const bands2 = await res2.json();
                    const names2 = new Set(bands2.map(b => b.name.toLowerCase().trim()));
                    sharedNames = new Set(bands1.filter(b => names2.has(b.name.toLowerCase().trim())).map(b => b.name.toLowerCase().trim()));

                    stats.innerText = `${sharedNames.size} Überschneidungen mit ${select.options[otherIdx].textContent} gefunden.`;
                } else {
                    stats.innerText = `${bands1.length} Bands bestätigt.`;
                }

                tableBody.innerHTML = '';
                bands1.forEach(band => {
                    const isShared = sharedNames.has(band.name.toLowerCase().trim());
                    const row = document.createElement('tr');
                    if (isShared) row.classList.add('shared-band');
                    row.innerHTML = `
                    <td>${getFlagImg(band.country)}</td>
                    <td class="band-name">${band.name} ${isShared ? '<span class="badge">DOPPELT</span>' : ''}</td>
                    <td>${band.genre || "N/A"}</td>
                `;
                    tableBody.appendChild(row);
                });
            } catch (e) {
                tableBody.innerHTML = '<tr><td colspan="3" style="text-align:center;">Fehler beim Laden der Daten.</td></tr>';
            }
        }

        select.addEventListener('change', loadAndCompare);
        toggle.addEventListener('change', loadAndCompare);

        // Initialisierung
        fetchFestivalFiles();
    </script>
</body>

</html>
